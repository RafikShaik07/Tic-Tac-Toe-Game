<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartoon Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CARTOON BACKGROUND -->
<div class="sky"></div>
<div class="sun"></div>
<div class="rainbow"></div>

<div class="flying-layer layer1"></div>
<div class="flying-layer layer2"></div>
<div class="flying-layer layer3"></div>
<div class="birds"></div>

<!-- GAME -->
<div class="container">

<h1>Tic Tac Toe</h1>

<div id="board" class="board"></div>

<div id="status" class="status">Player X Turn</div>

<button onclick="restartGame()">Restart Game</button>

</div>

<script src="script.js"></script>
</body>
</html>
